<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Glycan Pathway Simulator</title>
    <meta
      name="description"
      content="糖鎖の流れを直接操作し、最終的なA/B/Cの分布変化を観察する静的Webアプリケーション"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#networkSvg">ネットワークへ移動</a>

    <header class="topbar">
      <div class="brand-block">
        <p class="eyebrow">Glycan Pathway Simulator</p>
        <h1>糖鎖の流れを、触って試す</h1>
        <p class="headline-message">糖鎖生物学 × 情報通信ネットワーク</p>
        <p class="headline-support">糖鎖の生合成過程をネットワークフローとして体験するデモ</p>
      </div>
      <div class="quick-guide" aria-label="基本操作">
        <span><b>1</b>線を選ぶ</span>
        <span><b>2</b>バーを動かす</span>
        <span><b>3</b>A/B/Cを見る</span>
      </div>
    </header>

    <main class="simulator-grid" id="simulator">
      <section class="network-stage" aria-labelledby="network-heading">
        <div class="stage-topline">
          <div>
            <p class="eyebrow">Network</p>
            <h2 id="network-heading">太い線ほど、たくさん流れています</h2>
          </div>
          <div class="flow-legend" aria-label="Flow legend">
            <span><i class="line active"></i>太いほど多い</span>
            <span><i class="line stopped"></i>停止</span>
            <span><i class="dot selected"></i>選択中</span>
          </div>
        </div>

        <section class="edge-editor" aria-labelledby="edge-editor-title">
          <div class="edge-summary">
            <span>選択中の線</span>
            <h2 id="edge-editor-title">線を選択</h2>
            <p id="edgeMeta">ネットワーク上の線をクリック</p>
          </div>

          <label class="capacity-slider" for="edgeCapacityInput">
            <span>通しやすさ</span>
            <output id="edgeCapacityOutput" for="edgeCapacityInput" aria-hidden="true"></output>
            <input id="edgeCapacityInput" type="range" min="0" max="200" value="100" />
          </label>

          <div class="edge-actions" aria-label="流れやすさ操作">
            <button id="edgeKoButton" class="danger-action" type="button">停止</button>
            <button id="edgeMinusButton" class="icon-action" type="button" aria-label="流れやすさを下げる">-</button>
            <button id="edgePlusButton" class="icon-action" type="button" aria-label="流れやすさを上げる">+</button>
            <button id="edgeResetButton" class="secondary-action" type="button">戻す</button>
            <button class="secondary-action" id="undoButton" type="button" disabled>Undo</button>
            <button class="secondary-action" id="resetButton" type="button" aria-label="全て標準に戻す">全戻し</button>
          </div>

          <div class="edge-readout" aria-live="polite">
            <span>流量</span>
            <strong id="selectedEdgeFlow">0</strong>
            <span>差分</span>
            <strong id="selectedEdgeDelta">0</strong>
          </div>
        </section>

        <div class="network-wrap">
          <div class="state-overlay" id="networkLoading">Loading</div>
          <svg id="networkSvg" class="network-svg" viewBox="0 0 1040 650" role="img" aria-labelledby="networkTitle networkDesc">
            <title id="networkTitle">糖鎖生合成ネットワーク</title>
            <desc id="networkDesc">線を選択して通しやすさを変更すると、流量と最終分布が変化します。</desc>
          </svg>
        </div>

        <div class="edge-hint" id="edgeHint" aria-live="polite">
          <span>結果の読み方</span>
          <strong id="insightText">通しやすさを変えると下流の流量が再配分されます。</strong>
        </div>
      </section>

      <aside class="result-dock" aria-label="結果">
        <section class="dock-section output-panel" id="output" aria-labelledby="output-title">
          <div class="section-title">
            <span>結果</span>
            <strong id="totalFlux">0</strong>
          </div>
          <h2 id="output-title">A / B / C</h2>
          <div id="phenotypeChart" class="phenotype-chart" aria-live="polite">
            <div class="empty-state">Calculating</div>
          </div>
        </section>
      </aside>
    </main>

    <div class="feedback-toast" id="feedbackToast" role="status" aria-live="polite" hidden></div>

    <noscript>
      <p class="noscript-message">このシミュレーターを使うには JavaScript を有効にしてください。</p>
    </noscript>

    <script src="app.js?v=flow-conservation"></script>
  </body>
</html>
